<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/style.css">
    <script defer src="./js/main.js"></script>
    <script defer src="./js/converter.js"></script>
    <title>Gestión Financiera</title>
</head>
<body>

    <div class="cont__cuestionario--inicial">
        
        <form id="iniciando">
            <h2>Ingresá tus datos para comenzar</h2>
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required maxlength="13">
            <p class="alerta__name"></p>
        
            <label for="ingresos">Ingresos</label>
            <input type="number" id="ingresos" name="ingresos" required>
            <p class="alerta__ingreso"></p>

            <label for="ahorros-mes">Ahorros Esperados</label>
            <input type="number" id="ahorros-mes" name="ahorros-mes" required>
            <p class="alerta__ahorro--mes"></p>

            <label for="mes">Mes a Evaluar</label>
            <input type="text" id="mes" name="mes" required maxlength="11">
            <p class="alerta__mes"></p>

            <button type="submit">Enviar</button>
        </form>

    </div>


    <div class="layout">

        <header>
            <h1>
                Bienvenido a tu Centro de Gestión Financiera,
                <strong id="nombre__titulo"></strong>.
            </h1>
        </header>

    <aside class="sidebar">

        <div class="cont__imagen--logo">
            <img src="./assets/logo/logo.png" alt="logo"> 
        </div>

        <hr>

        <div class="item__sidebar">
            <i class="bi bi-bar-chart-fill"></i>
            <span class="span__sidebar">Dashboard</span>
        </div>

        <div class="info__sidebar">
            <span id="text__sidebar">

            </span>
        </div>

    </aside>

    <main>

        <div class="mes">
            <h3 class="mes__dashboard"></h3>
        </div>

        <div class="cont__balance">
            <span class="balance">Balance: <span id="balance__movimientos">$ 0</span></span>
            <div class="conversor">
                <p>Conversor</p>
                <div class="organizando--conversor">
                    <select name="moneda--conversor" id="converter"></select>
                    <p id="moneda--convertida"></p>
                </div>

            </div>
        </div>

        <div class="simular__guardado">
            <button id="guardar__sesion">Guardar Progreso</button>
            <button id="borrar__progreso">Borrar Progreso</button>
        </div>

        <div class="cont__ingresos">
            <h3>Total Ingresos</h3>
            <span id="monto__ingresos">$ 0</span>
            <hr>
            <button id="btn__agregar--ingreso">Agregar Ingreso</button>
        </div>

        <div class="cont__gastos">
            <h3>Total Gastos</h3>
            <span id="monto__gastos">$ 0</span>
            <hr>
            <button id="btn__agregar--gasto">Agregar Gastos</button>
        </div>

        <div class="movimientos">
        <h3>Últimos Movimientos</h3>
        
        <label for="movimientos" class="label__movimientos">Filtro Movimientos:</label>
        <select id="filtro__movimientos" name="movimientos">
            <option value="todo">Todo</option>
            <option value="ingreso">Ingreso</option>
            <option value="entretenimiento">Entretenimiento</option>
            <option value="hogar">Hogar</option>
            <option value="comida">Comida</option>
            <option value="transporte">Transporte</option>
            <option value="imprevisto">Imprevisto</option>
            <option value="salud">Salud</option>
        </select>

        <div class="contenedor__tabla--movimientos">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Icono</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="ultimos__movimientos"></tbody>
            </table>
            
        </div>
        </div>



        <div class="ahorros">
            <h3>Ahorrar</h3>
            <div>
                <span id="contador__ahorros">$ 0</span> <span id="ahorro__pensado"></span>
            </div>
            <hr>
            <div>
                <button id="sumar__ahorro">Sumar Ahorro</button>
            </div>
        </div>

        
        <div class="historial__ahorros">
            <h3>Historial Ahorros</h3>
            <div class="contenedor__tabla">
                <table class="tabla">
                    <thead>
                        <tr>
                            <th>Icono</th>
                            <th>Monto</th>
                            <th>Fecha</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tabla__ahorros"></tbody>
                </table>
            </div>
        </div>



    </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
